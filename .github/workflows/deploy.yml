name: Deploy Web

on:
    push:
        branches:
            - main

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Deploy via SSH
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: deploy
                  key: ${{ secrets.VPS_SSH_KEY }}
                  script: |
                      set -euo pipefail

                      echo "Deploy iniciado..."

                      echo "Actualizando código..."
                      sudo -u bot bash -c "cd /opt/bot/triskweb && git fetch origin"
                      sudo -u bot bash -c "cd /opt/bot/triskweb && git reset --hard origin/main"

                      echo "Instalando dependencias..."
                      sudo -u bot bash -c "cd /opt/bot/triskweb && npm ci"

                      echo "Generando build..."
                      sudo -u bot bash -c "cd /opt/bot/triskweb && npm run build"

                      echo "Reiniciando servicio..."
                      sudo systemctl restart triskweb

                      echo "Deploy completado."
